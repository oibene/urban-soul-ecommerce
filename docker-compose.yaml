services:

  web:
    build: ./urbansoul-app
    container_name: urbansoul-app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL}
    depends_on:
      - api
    volumes:
      - ./urbansoul-app:/app
      - /app/node_modules
    user: "node"

  api:
    build: ./urbansoul-API
    container_name: urbansoul-API
    ports:
      - "8080:8080"
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
    depends_on:
      - db
  
  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}

    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/seeds:/docker-entrypoint-initdb.d

volumes:
  db_data:
