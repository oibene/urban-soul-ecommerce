services:

  web:
    build: ./urbansoul-app
    container_name: urbansoul-app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://urbansoul-api:8080
    depends_on:
      - api
    volumes:
      - ./urbansoul-app:/app

  api:
    build: ./urbansoul-api
    container_name: urbansoul-api
    restart: always
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/seeds:/docker-entrypoint-initdb.d

volumes:
  db_data:
